<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Studio Pro Max - Casa Alfredo</title>
    
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --accent: #f97316; --glass: rgba(255, 255, 255, 0.05); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); font-family: 'Inter', sans-serif; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .playlist-scroll { max-height: 350px; overflow-y: auto; padding-right: 8px; }
        .playlist-scroll::-webkit-scrollbar { width: 5px; }
        .playlist-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .file-item { @apply flex items-center justify-between p-3 mb-2 rounded-xl transition-all cursor-pointer border border-transparent; background: rgba(255, 255, 255, 0.03); }
        .file-item.active { background: rgba(249, 115, 22, 0.2); border-color: var(--accent); }
        .rotating { animation: rotate 15s linear infinite; animation-play-state: paused; }
        .playing .rotating { animation-play-state: running; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .video-monitor { 
            background: #000; 
            border-radius: 24px; 
            overflow: hidden; 
            width: 100%; 
            max-width: 900px;
            margin: 0 auto;
            border: 4px solid #1e293b;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }
        footer { margin-top: auto; background: rgba(0, 0, 0, 0.3); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 20px 0; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-6xl mx-auto w-full">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 style="font-family: 'Syncopate', sans-serif;" class="text-2xl font-bold text-orange-500 tracking-tighter uppercase">Media Studio <span class="text-white text-sm font-light">Pro</span></h1>
                <p class="text-[9px] text-gray-500 tracking-[5px] uppercase">TecnologĒas JMZA</p>
            </div>
            <div class="flex gap-2">
                <button id="install-btn" class="hidden px-6 py-2 rounded-xl text-[10px] font-black bg-blue-600 text-white shadow-lg animate-pulse uppercase">
                    <i class="fas fa-download mr-2"></i>Instalar App
                </button>
                <button onclick="switchTab('music')" id="btn-m" class="px-6 py-2 rounded-xl text-[10px] font-black bg-orange-500 text-black shadow-lg transition-all uppercase">Audio</button>
                <button onclick="switchTab('video')" id="btn-v" class="px-6 py-2 rounded-xl text-[10px] font-black bg-white/5 border border-white/10 hover:bg-white/10 transition-all uppercase">Cinema</button>
            </div>
        </div>

        <div class="mb-8">
            <div id="music-display" class="flex flex-col items-center py-6">
                <div id="disc-container" class="relative mb-6">
                    <div class="w-56 h-56 md:w-64 md:h-64 rounded-full border-[12px] border-gray-900 overflow-hidden rotating shadow-2xl">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=500" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div id="video-display" class="hidden">
                <div class="video-monitor">
                    <video id="main-video" class="w-full aspect-video" controlslist="nodownload"></video>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 md:p-8 mb-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <div class="flex flex-col justify-center">
                    <div class="mb-6 border-l-4 border-orange-500 pl-4">
                        <h2 id="current-title" class="text-xl font-bold truncate text-white uppercase tracking-tight">Sistema Casa Alfredo</h2>
                        <p id="status-label" class="text-gray-500 text-[9px] uppercase tracking-[4px] mt-1 font-black">Multimedia Engine v2.0</p>
                    </div>
                    
                    <div class="bg-black/40 p-6 rounded-3xl border border-white/5 shadow-inner">
                        <input type="range" id="prog-bar" value="0" class="w-full accent-orange-500 h-1 cursor-pointer">
                        <div class="flex justify-between text-[10px] text-gray-500 mt-4 font-mono uppercase">
                            <span id="t-start">0:00</span>
                            <span id="t-end">0:00</span>
                        </div>

                        <div class="flex items-center gap-3 mt-6 bg-black/20 p-3 rounded-2xl border border-white/5">
                            <button onclick="toggleMute()" class="focus:outline-none">
                                <i class="fas fa-volume-high text-orange-500 text-xs transition-all" id="vol-icon"></i>
                            </button>
                            <input type="range" id="vol-bar" min="0" max="1" step="0.01" value="1" class="w-full accent-orange-500 h-1 cursor-pointer opacity-70 hover:opacity-100 transition-all">
                            <span id="vol-percent" class="text-[9px] text-gray-500 font-mono w-8">100%</span>
                        </div>

                        <div class="flex items-center justify-center gap-10 mt-6">
                            <button onclick="playPrev()" class="text-gray-600 hover:text-orange-500 text-xl transition-all"><i class="fas fa-backward-step"></i></button>
                            <button onclick="togglePlayback()" id="master-play" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center text-2xl shadow-[0_0_30px_rgba(255,255,255,0.2)] hover:scale-110 active:scale-95 transition-all"><i class="fas fa-play"></i></button>
                            <button onclick="playNext()" class="text-gray-600 hover:text-orange-500 text-xl transition-all"><i class="fas fa-forward-step"></i></button>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                        <div class="flex bg-black/50 p-1 rounded-xl border border-white/5">
                            <button onclick="setMode('all')" id="mode-all" class="px-4 py-2 rounded-lg text-[9px] font-black bg-white text-black uppercase transition-all">Todos</button>
                            <button onclick="setMode('fav')" id="mode-fav" class="px-4 py-2 rounded-lg text-[9px] font-black text-gray-500 hover:text-white uppercase transition-all">Favs (<span id="fav-count">0</span>)</button>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button onclick="clearCurrentList()" class="flex-1 sm:flex-none bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2 rounded-xl text-[9px] font-black transition-all uppercase border border-red-600/20">
                                <i class="fas fa-trash-can mr-2"></i>Limpiar
                            </button>
                            <label class="flex-1 sm:flex-none cursor-pointer bg-orange-600 hover:bg-orange-500 text-white px-4 py-2 rounded-xl text-[9px] font-black transition-all flex items-center justify-center shadow-lg uppercase">
                                <i class="fas fa-plus mr-2"></i>A±adir
                                <input type="file" id="file-input" multiple accept="audio/*,video/*" class="hidden">
                            </label>
                        </div>
                    </div>
                    <div id="file-list" class="playlist-scroll"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p class="text-[10px] text-gray-500 uppercase tracking-[2px]">Todos los derechos reservados, creado por <span class="text-orange-500 font-bold">JMZA Casa Alfredo TecnologĒas Informaticas</span></p>
        <p class="text-[9px] text-gray-600 mt-1">Fecha de creaci¾n: 18 de Abril del 2026</p>
    </footer>

    <audio id="main-audio" onended="playNext()"></audio>

    <script>
        // REGISTRO SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('Error SW', err));
            });
        }

        let mediaFiles = [];
        let listMode = 'all';
        let currentTrackId = null;
        let favorites = new Set();
        let currentTab = 'music';
        let deferredPrompt;
        let lastVol = 1;

        const audio = document.getElementById('main-audio');
        const video = document.getElementById('main-video');
        const installBtn = document.getElementById('install-btn');

        // GESTIėN DE ARCHIVOS
        document.getElementById('file-input').onchange = e => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                mediaFiles.push({
                    id: Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    src: URL.createObjectURL(file),
                    type: file.type.startsWith('audio') ? 'music' : 'video'
                });
            });
            e.target.value = ''; // Permite volver a subir el mismo archivo
            renderUI();
        };

        function deleteFile(id) {
            mediaFiles = mediaFiles.filter(f => f.id !== id);
            if (currentTrackId === id) {
                audio.pause(); video.pause();
                audio.src = ""; video.src = "";
                currentTrackId = null;
                updatePlayIcons(false);
            }
            renderUI();
        }

        function clearCurrentList() {
            if(confirm(`┐Deseas borrar toda la lista de ${currentTab === 'music' ? 'audio' : 'video'}?`)) {
                mediaFiles = mediaFiles.filter(f => f.type !== currentTab);
                audio.pause(); video.pause();
                audio.src = ""; video.src = "";
                currentTrackId = null;
                updatePlayIcons(false);
                renderUI();
            }
        }

        // RENDERIZADO (Listas separadas)
        function renderUI() {
            const container = document.getElementById('file-list');
            container.innerHTML = '';
            
            // Filtro por tipo (Audio/Video)
            let filtered = mediaFiles.filter(f => f.type === currentTab);
            
            // Filtro por modo (Todos/Favoritos)
            const displayList = listMode === 'all' ? filtered : filtered.filter(f => favorites.has(f.id));
            
            document.getElementById('fav-count').innerText = filtered.filter(f => favorites.has(f.id)).length;

            displayList.forEach(file => {
                const active = file.id === currentTrackId;
                const isFav = favorites.has(file.id);
                const item = document.createElement('div');
                item.className = `file-item ${active ? 'active' : ''}`;
                item.onclick = () => playMedia(file.id);
                item.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden flex-1">
                        <i class="fas ${file.type === 'music' ? 'fa-music' : 'fa-video'} ${active ? 'text-white' : 'text-orange-500'}"></i>
                        <span class="text-[10px] font-bold truncate uppercase ${active ? 'text-white' : 'text-gray-500'}">${file.name}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="event.stopPropagation(); toggleFavorite('${file.id}')" class="p-2 ${isFav ? 'text-yellow-500' : 'text-gray-700'}">
                            <i class="${isFav ? 'fas' : 'far'} fa-star"></i>
                        </button>
                        <button onclick="event.stopPropagation(); deleteFile('${file.id}')" class="p-2 text-gray-700 hover:text-red-500 transition-colors">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>`;
                container.appendChild(item);
            });
        }

        // CONTROL DE REPRODUCCIėN
        function playMedia(id) {
            const file = mediaFiles.find(f => f.id === id);
            if (!file) return;
            currentTrackId = id;
            
            audio.pause(); video.pause();
            
            if (file.type === 'music') {
                audio.src = file.src;
                audio.load();
                audio.play();
            } else {
                video.src = file.src;
                video.load();
                video.play();
            }
            
            document.getElementById('current-title').innerText = file.name;
            document.getElementById('status-label').innerText = `MODO ${file.type === 'music' ? 'AUDIO' : 'CINEMA'} ACTIVO`;
            updatePlayIcons(true);
            renderUI();
        }

        function togglePlayback() {
            const activePlayer = currentTab === 'music' ? audio : video;
            
            if (!currentTrackId) {
                const list = mediaFiles.filter(f => f.type === currentTab);
                if (list.length > 0) playMedia(list[0].id);
                return;
            }
            
            if (activePlayer.paused) { activePlayer.play(); updatePlayIcons(true); } 
            else { activePlayer.pause(); updatePlayIcons(false); }
        }

        function switchTab(tab) {
            if(currentTab !== tab) { audio.pause(); video.pause(); updatePlayIcons(false); }
            currentTab = tab;
            
            document.getElementById('music-display').style.display = tab === 'music' ? 'flex' : 'none';
            document.getElementById('video-display').style.display = tab === 'video' ? 'block' : 'none';
            
            document.getElementById('btn-m').className = tab === 'music' ? "px-6 py-2 rounded-xl text-[10px] font-black bg-orange-500 text-black shadow-lg uppercase" : "px-6 py-2 rounded-xl text-[10px] font-black bg-white/5 border border-white/10 hover:bg-white/10 uppercase";
            document.getElementById('btn-v').className = tab === 'video' ? "px-6 py-2 rounded-xl text-[10px] font-black bg-orange-500 text-black shadow-lg uppercase" : "px-6 py-2 rounded-xl text-[10px] font-black bg-white/5 border border-white/10 hover:bg-white/10 uppercase";
            
            renderUI();
        }

        function updatePlayIcons(isPlaying) {
            document.getElementById('master-play').innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            document.getElementById('disc-container').classList.toggle('playing', isPlaying);
        }

        function toggleFavorite(id) {
            favorites.has(id) ? favorites.delete(id) : favorites.add(id);
            renderUI();
        }

        function setMode(m) {
            listMode = m;
            document.getElementById('mode-all').className = m === 'all' ? 'px-4 py-2 rounded-lg text-[9px] font-black bg-white text-black uppercase' : 'px-4 py-2 rounded-lg text-[9px] font-black text-gray-500 uppercase';
            document.getElementById('mode-fav').className = m === 'fav' ? 'px-4 py-2 rounded-lg text-[9px] font-black bg-white text-black uppercase' : 'px-4 py-2 rounded-lg text-[9px] font-black text-gray-500 uppercase';
            renderUI();
        }

        function playNext() {
            const filtered = mediaFiles.filter(f => f.type === currentTab);
            const list = listMode === 'all' ? filtered : filtered.filter(f => favorites.has(f.id));
            let idx = list.findIndex(f => f.id === currentTrackId);
            if (idx !== -1) playMedia(list[(idx + 1) % list.length].id);
        }

        function playPrev() {
            const filtered = mediaFiles.filter(f => f.type === currentTab);
            const list = listMode === 'all' ? filtered : filtered.filter(f => favorites.has(f.id));
            let idx = list.findIndex(f => f.id === currentTrackId);
            if (idx !== -1) playMedia(list[(idx - 1 + list.length) % list.length].id);
        }

        // PROGRESO Y VOLUMEN
        const updateProg = (player) => {
            const p = (player.currentTime / player.duration) * 100 || 0;
            document.getElementById('prog-bar').value = p;
            document.getElementById('t-start').innerText = formatTime(player.currentTime);
            document.getElementById('t-end').innerText = formatTime(player.duration);
        };
        audio.ontimeupdate = () => updateProg(audio);
        video.ontimeupdate = () => updateProg(video);
        
        document.getElementById('prog-bar').oninput = (e) => {
            const activePlayer = currentTab === 'music' ? audio : video;
            if (activePlayer.duration) activePlayer.currentTime = (e.target.value / 100) * activePlayer.duration;
        };

        function formatTime(s) { if(isNaN(s)) return "0:00"; const m = Math.floor(s/60), rs = Math.floor(s%60); return `${m}:${rs < 10 ? '0' : ''}${rs}`; }

        const volBar = document.getElementById('vol-bar');
        function updateVolume(val) {
            audio.volume = video.volume = val;
            document.getElementById('vol-percent').innerText = Math.round(val * 100) + "%";
            const icon = document.getElementById('vol-icon');
            if(val == 0) icon.className = "fas fa-volume-mute text-red-500";
            else if (val < 0.5) icon.className = "fas fa-volume-low text-gray-500";
            else icon.className = "fas fa-volume-high text-orange-500";
        }
        volBar.oninput = (e) => updateVolume(e.target.value);

        function toggleMute() {
            if (audio.volume > 0) { lastVol = audio.volume; updateVolume(0); volBar.value = 0; }
            else { updateVolume(lastVol || 1); volBar.value = lastVol || 1; }
        }

        // INSTALACIėN PWA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.classList.add('hidden');
                deferredPrompt = null;
            }
        };

        // INICIO
        switchTab('music');
    </script>
</body>
</html>
